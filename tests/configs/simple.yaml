hosts:
- hostname: 127.0.0.1
  fence_agent: null
  fence_parameters: null

resources:
- name: test_zpool
  kind: heartbeat/ZFS
  parameters:
    pool: test_zpool
  dependents:
  - test_mgt
  - test_ost
  - test_mdt
- name: test_mgt
  kind: lustre/Lustre
  parameters:
    target: test_mgt
    mountpoint: /mnt/test_mgt
    type: mgt
  dependents: []
- name: test_mdt
  kind: lustre/Lustre
  parameters:
    target: test_mdt
    mountpoint: /mnt/test_mdt
    type: mdt
  dependents: []
- name: test_ost
  kind: lustre/Lustre
  parameters:
    target: test_ost
    mountpoint: /mnt/test_ost
    type: ost
  dependents: []

resource_groups:
- root: test_zpool
  home_host: 127.0.0.1
  failover_hosts: []
